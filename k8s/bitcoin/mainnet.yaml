apiVersion: v1
kind: Service
metadata:
  name: bitcoin
spec:
  ports:
  - nodePort: 30002
    port: 8332
    protocol: TCP
    targetPort: 8332
  selector:
    app: bitcoin
  type: LoadBalancer
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: bitcoin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bitcoin
  serviceName: bitcoin
  template:
    metadata:
      labels:
        app: bitcoin
    spec:
      containers:
      - image: vxeumregistry.azurecr.io/bitcoin:0058c1edeafa50afde9057caaf91e1158da4d634
        name: bitcoin
        volumeMounts:
        - mountPath: /root/.bitcoin
          name: bitcoin
      restartPolicy: Always
  volumeClaimTemplates:
  - metadata:
      name: bitcoin
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 1Ti
      storageClassName: managed
