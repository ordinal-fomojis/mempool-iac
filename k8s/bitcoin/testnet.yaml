apiVersion: v1
kind: Service
metadata:
  name: bitcoin-testnet
spec:
  ports:
  - nodePort: 30001
    port: 18332
    protocol: TCP
    targetPort: 18332
  selector:
    app: bitcoin-testnet
  type: LoadBalancer
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: bitcoin-testnet
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bitcoin-testnet
  serviceName: bitcoin-testnet
  template:
    metadata:
      labels:
        app: bitcoin-testnet
    spec:
      containers:
      - args: ["-testnet4", "-rpcuser=$(BITCOIN_RPC_USERNAME)", "-rpcpassword=$(BITCOIN_RPC_PASSWORD)"]
        image: vxeumregistry.azurecr.io/bitcoin:5405439b253ca3b7ca0544edb012e9d33d617a70
        name: bitcoin-testnet
        envFrom:
        - secretRef:
            name: bitcoin-rpc-password
        volumeMounts:
        - mountPath: /root/.bitcoin
          name: bitcoin-testnet
        - mountPath: /root
          name: bitcoin-conf
          readOnly: true
      restartPolicy: Always
      volumes:
      - configMap:
          name: bitcoin-conf
        name: bitcoin-conf
  volumeClaimTemplates:
  - metadata:
      name: bitcoin-testnet
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 100Gi
      storageClassName: managed
