apiVersion: v1
kind: Service
metadata:
  name: bitcoin-testnet
spec:
  ports:
  - nodePort: 30001
    port: 18332
    protocol: TCP
    targetPort: 18332
  selector:
    app: bitcoin-testnet
  type: LoadBalancer
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: bitcoin-testnet
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bitcoin-testnet
  serviceName: bitcoin-testnet
  template:
    metadata:
      labels:
        app: bitcoin-testnet
    spec:
      containers:
      - args:
        - -testnet4
        image: vxeumregistry.azurecr.io/bitcoin:0058c1edeafa50afde9057caaf91e1158da4d634
        name: bitcoin-testnet
        volumeMounts:
        - mountPath: /root/.bitcoin
          name: bitcoin-testnet
      restartPolicy: Always
  volumeClaimTemplates:
  - metadata:
      name: bitcoin-testnet
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 100Gi
      storageClassName: managed
