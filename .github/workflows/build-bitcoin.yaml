name: Build Bitcoin
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'prod'
        type: choice
        options:
          - prod
          - nonprod

permissions:
  id-token: write # Required for OIDC authentication with Azure
  contents: write
  pull-requests: write
  
env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ENVIRONMENT: ${{ inputs.environment || 'prod' }}

jobs:
  deploy-application:
    name: 'Build Bitcoin'
    runs-on: linux-arm64
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure CLI Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Get ACR Details
        id: acr-details
        run: |
          terraform init -backend-config="key=terraform-$ENVIRONMENT.tfstate"
          echo "acr_name=$(terraform output -raw acr_name)" >> $GITHUB_OUTPUT
        working-directory: terraform

      - name: ACR Login
        run: az acr login --name ${{ steps.acr-details.outputs.acr_name }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: k8s/bitcoin
          push: true
          tags: ${{ steps.acr-details.outputs.acr_name }}.azurecr.io/bitcoin:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Update Image Tag
        run: |
          pip install -r scripts/requirements.txt
          python scripts/update-image-tag.py
        env:
          IMAGE: ${{ steps.acr-details.outputs.acr_name }}.azurecr.io/bitcoin:${{ github.sha }}
        
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: '[Bot] Update bitcoin image'
          branch: update-bitcoin-image
          title: '[Bot] Update bitcoin image'
          add-paths: 'k8s/bitcoin/*.yaml'
