name: Deploy Application
on:
  push:
    branches:
      - main
    paths:
      - 'k8s/**/*.yaml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        default: 'prod'
        type: choice
        options:
          - prod
          - nonprod

permissions:
  id-token: write # Required for OIDC authentication with Azure
  contents: read
  issues: write

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ENVIRONMENT: ${{ inputs.environment || 'prod' }}

jobs:
  deploy-application:
    name: 'Deploy Bitcoin'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure CLI Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Get Terrform Outputs
        id: tf-outputs
        run: |
          terraform init -backend-config="key=terraform-$ENVIRONMENT.tfstate"
          echo "rg_name=$(terraform output -raw rg_name)" >> $GITHUB_OUTPUT
          echo "k8s_cluster_name=$(terraform output -raw k8s_cluster_name)" >> $GITHUB_OUTPUT
          acr_name=$(terraform output -raw acr_name)
          echo "acr_name=$acr_name" >> $GITHUB_OUTPUT

          mainnet_rpc_password=$(terraform output -raw mainnet_rpc_password)
          echo "::add-mask::$mainnet_rpc_password"
          echo "mainnet_rpc_password=$mainnet_rpc_password" >> "$GITHUB_OUTPUT"

          testnet_rpc_password=$(terraform output -raw testnet_rpc_password)
          echo "::add-mask::$testnet_rpc_password"
          echo "testnet_rpc_password=$testnet_rpc_password" >> "$GITHUB_OUTPUT"

          image_tag=$(az acr repository show-tags --n $acr_name --repository bitcoin \
            --orderby time_desc --top 1 --output tsv)
          echo "image_tag=$image_tag" >> $GITHUB_OUTPUT
        working-directory: terraform

      - name: Set up kubelogin for non-interactive login
        uses: azure/use-kubelogin@v1
        with:
          kubelogin-version: 'v0.0.25'
          
      - name: Get K8s context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ steps.tf-outputs.outputs.rg_name }}
          cluster-name: ${{ steps.tf-outputs.outputs.k8s_cluster_name }}
          admin: 'false'
          use-kubelogin: 'true'
      
      - name: Deploy Mainnet
        run: helm upgrade --install testnet helm/bitcoin \
          --set acrName=${{ steps.tf-outputs.outputs.acr_name }} \
          --set bitcoinImageTag=${{ steps.tf-outputs.outputs.image_tag }} \
          --set chains.mainnet.enabled=${{ env.ENVIRONMENT == 'prod' }} \
          --set chains.testnet.rpcPassword=${{ steps.tf-outputs.outputs.testnet_rpc_password }} \
          --set chains.mainnet.rpcPassword=${{ steps.tf-outputs.outputs.mainnet_rpc_password }}