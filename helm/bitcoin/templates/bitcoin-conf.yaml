apiVersion: v1
kind: ConfigMap
metadata:
  name: bitcoin-conf
data:
  bitcoin.conf: |
    prune=0
    txindex=1
    server=1
    rpcallowip=0.0.0.0/0
    coinstatsindex=1
    listen=1
    discover=1
    par=16
    mempoolfullrbf=1
    maxconnections=100
    blocksxor=0

    [main]
    mempoolexpiry=999999
    maxmempool=4096
    dbcache=8192
    rpcbind=0.0.0.0

    [testnet4]
    rpcbind=0.0.0.0
