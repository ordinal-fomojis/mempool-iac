{{- range $name, $config := .Values.chains -}}
{{- if $config.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "bitcoin.bitcoinIngressName" $config }}
  annotations:
    cert-manager.io/issuer: letsencrypt-issuer
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: basic-auth
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Authorization "Basic {{ printf "%s:%s" $config.rpcUser $config.rpcPassword | b64enc }}";
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - {{ $.Values.hostname }}
    secretName: certificate-tls
  rules:
  - host: {{ $.Values.hostname }}
    http:
      paths:
      - path: {{ include "bitcoin.bitcoinPath" $config }}
        pathType: Exact
        backend:
          service:
            name: {{ include "bitcoin.bitcoinServiceName" $config }}
            port:
              number: {{ include "bitcoin.rpcPort" $config }}
---
{{- end -}}
{{- end }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mempool-ingress
  annotations:
    cert-manager.io/issuer: letsencrypt-issuer
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: basic-auth
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - {{ $.Values.hostname }}
    secretName: certificate-tls
  rules:
  {{- range $name, $config := .Values.chains -}}
  {{- if $config.enabled }}
  - host: {{ $.Values.hostname }}
    http:
      paths:
      - path: {{ include "bitcoin.mempoolPath" $config }}
        pathType: Prefix
        backend:
          service:
            name: {{ include "bitcoin.mempoolServiceName" $config }}
            port:
              number: 8999
  {{- end -}}
  {{- end -}}
