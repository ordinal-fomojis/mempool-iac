apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress
  annotations:
    nginx.ingress.kubernetes.io/health-check-path: "/"
    nginx.ingress.kubernetes.io/health-check-interval: "0"
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      # - pathType: Prefix
      #   path: /
      #   backend:
      #     service:
      #       name: bitcoin-testnet-service
      #       port:
      #         number: 48332
      - pathType: Prefix
        path: /api/v1/
        backend:
          service:
            name: mempool-testnet-service
            port:
              number: 8999
