{{- range $name, $config := .Values.chains -}}
{{- if $config.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "bitcoin.bitcoinIngressName" $config }}
  annotations:
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Authorization "Basic {{ printf "%s:%s" $config.rpcUser $config.rpcPassword | b64enc }}";
spec:
  ingressClassName: nginx
  rules:
  - host: {{ include "bitcoin.bitcoinUrl" $config }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ include "bitcoin.bitcoinServiceName" $config }}
            port:
              number: {{ include "bitcoin.rpcPort" $config }}
---
{{- end -}}
{{- end }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mempool-ingress
spec:
  ingressClassName: nginx
  rules:
  {{- range $name, $config := .Values.chains -}}
  {{- if $config.enabled }}
  - host: {{ include "bitcoin.mempoolUrl" $config }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ include "bitcoin.mempoolServiceName" $config }}
            port:
              number: 8999
  {{- end -}}
  {{- end -}}
