apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress
  annotations:
    nginx.ingress.kubernetes.io/health-check-path: "/"
    nginx.ingress.kubernetes.io/health-check-interval: "0"
spec:
  ingressClassName: nginx
  rules:
  - http:
    paths:
    - pathType: Prefix
      backend:
        service:
          name: bitcoin-testnet-service
          port:
            number: 48332
      path: /
