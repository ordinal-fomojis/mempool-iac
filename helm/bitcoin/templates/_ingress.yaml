apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress
spec:
  ingressClassName: nginx
  rules:
  - host: bitcoin.generatord.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: bitcoin-testnet-service
            port:
              number: 48332
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: default-ingress
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - pathType: Exact
        path: /
        backend:
          service:
            name: demo
            port:
              number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mempool-ingress
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: mempool-testnet-service
            port:
              number: 8999
    host: bitcoin.eastus.cloudapp.azure.com

